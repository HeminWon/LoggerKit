name: CocoaPods Lint

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "HMLoggerKit.podspec"
      - "Sources/**"
      - ".github/workflows/cocoapods-lint.yml"
      - ".github/workflows/cocoapods-release.yml"
  push:
    branches: [ "main" ]
    paths:
      - "HMLoggerKit.podspec"
      - "Sources/**"
      - ".github/workflows/cocoapods-lint.yml"
      - ".github/workflows/cocoapods-release.yml"
  workflow_dispatch:

concurrency:
  group: cocoapods-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Print toolchain info
        run: |
          ruby --version
          pod --version
          xcodebuild -version
          xcodebuild -showsdks
          xcrun simctl list runtimes

      - name: Lint podspec
        shell: bash
        run: ./Scripts/pod-lib-lint.sh
