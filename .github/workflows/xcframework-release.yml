name: XCFramework Release

on:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.4)."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2

      - name: Install Ruby gems
        run: |
          bundle install --jobs 4 --retry 3
          bundle exec pod --version

      - name: Ensure Bash 4+
        id: setup_bash
        shell: bash
        run: |
          set -euo pipefail
          echo "System /bin/bash: $(/bin/bash --version | head -n 1)"
          MODERN_BASH="$(brew --prefix)/bin/bash"
          if [[ ! -x "${MODERN_BASH}" ]]; then
            brew install bash
          fi
          if [[ ! -x "${MODERN_BASH}" ]]; then
            echo "Modern bash not found: ${MODERN_BASH}" >&2
            exit 1
          fi
          echo "Using modern bash: $(${MODERN_BASH} --version | head -n 1)"
          echo "modern_bash=${MODERN_BASH}" >> "$GITHUB_OUTPUT"

      - name: Build XCFramework
        id: build
        shell: bash
        run: |
          set -euo pipefail
          BASH_BIN="${{ steps.setup_bash.outputs.modern_bash }}"
          if [[ -z "${BASH_BIN}" || ! -x "${BASH_BIN}" ]]; then
            echo "Invalid bash path: ${BASH_BIN}" >&2
            exit 1
          fi
          OUTPUTS_FILE="$(mktemp)"
          "${BASH_BIN}" Scripts/build-xcframework-from-podspec.sh --outputs-file "${OUTPUTS_FILE}"

          XCFRAMEWORK_PATH=""
          ARTIFACT_DIR=""
          XCFRAMEWORK_NAME=""

          while IFS='=' read -r key value; do
            case "${key}" in
              xcframework_path) XCFRAMEWORK_PATH="${value}" ;;
              artifact_dir) ARTIFACT_DIR="${value}" ;;
              xcframework_name) XCFRAMEWORK_NAME="${value}" ;;
            esac
          done < "${OUTPUTS_FILE}"

          if [[ -z "${XCFRAMEWORK_PATH}" || ! -d "${XCFRAMEWORK_PATH}" ]]; then
            echo "XCFramework not found: ${XCFRAMEWORK_PATH}" >&2
            exit 1
          fi
          if [[ -z "${ARTIFACT_DIR}" || ! -d "${ARTIFACT_DIR}" ]]; then
            ARTIFACT_DIR="$(cd "$(dirname "${XCFRAMEWORK_PATH}")" && pwd)"
          fi
          if [[ -z "${XCFRAMEWORK_NAME}" ]]; then
            XCFRAMEWORK_NAME="$(basename "${XCFRAMEWORK_PATH}")"
          fi

          echo "xcframework_path=${XCFRAMEWORK_PATH}" >> "$GITHUB_OUTPUT"
          echo "artifact_dir=${ARTIFACT_DIR}" >> "$GITHUB_OUTPUT"
          echo "xcframework_name=${XCFRAMEWORK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Package XCFramework
        id: package
        shell: bash
        run: |
          set -euo pipefail
          XCFRAMEWORK_PATH="${{ steps.build.outputs.xcframework_path }}"
          if [[ -z "${XCFRAMEWORK_PATH}" || ! -d "${XCFRAMEWORK_PATH}" ]]; then
            echo "XCFramework not found: ${XCFRAMEWORK_PATH}" >&2
            exit 1
          fi

          ARTIFACT_DIR="${{ steps.build.outputs.artifact_dir }}"
          if [[ -z "${ARTIFACT_DIR}" || ! -d "${ARTIFACT_DIR}" ]]; then
            ARTIFACT_DIR="$(cd "$(dirname "${XCFRAMEWORK_PATH}")" && pwd)"
          fi
          XCFRAMEWORK_NAME="${{ steps.build.outputs.xcframework_name }}"
          if [[ -z "${XCFRAMEWORK_NAME}" ]]; then
            XCFRAMEWORK_NAME="$(basename "${XCFRAMEWORK_PATH}")"
          fi
          ZIP_PATH="${ARTIFACT_DIR}/${XCFRAMEWORK_NAME}.zip"

          rm -f "${ZIP_PATH}"
          ditto -c -k --sequesterRsrc --keepParent "${XCFRAMEWORK_PATH}" "${ZIP_PATH}"
          CHECKSUM="$(swift package compute-checksum "${ZIP_PATH}")"
          CHECKSUM_FILE="${ARTIFACT_DIR}/${XCFRAMEWORK_NAME}.checksum.txt"

          {
            echo "File: ${XCFRAMEWORK_NAME}.zip"
            echo "SHA-256: ${CHECKSUM}"
          } > "${CHECKSUM_FILE}"

          echo "xcframework_name=${XCFRAMEWORK_NAME}" >> "$GITHUB_OUTPUT"
          echo "zip_path=${ZIP_PATH}" >> "$GITHUB_OUTPUT"
          echo "checksum_path=${CHECKSUM_FILE}" >> "$GITHUB_OUTPUT"
          echo "checksum=${CHECKSUM}" >> "$GITHUB_OUTPUT"

      - name: Resolve tag name
        id: meta
        shell: bash
        run: |
          TAG_INPUT="${{ github.event.inputs.tag }}"
          EVENT_NAME="${{ github.event_name }}"

          if [[ "${EVENT_NAME}" == "workflow_dispatch" && -z "${TAG_INPUT}" ]]; then
            echo "For workflow_dispatch, input 'tag' is required." >&2
            exit 1
          fi

          if [[ -n "${TAG_INPUT}" ]]; then
            TAG_NAME="${TAG_INPUT}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Sync binary podspec and commit
        id: sync_binary_podspec
        shell: bash
        run: |
          set -euo pipefail

          PODSPEC_PATH="Specs/Binary/HMLoggerKit.podspec"
          if [[ ! -f "${PODSPEC_PATH}" ]]; then
            echo "Binary podspec not found: ${PODSPEC_PATH}" >&2
            exit 1
          fi

          TAG_NAME="${{ steps.meta.outputs.tag }}"
          VERSION="${TAG_NAME#v}"
          CHECKSUM="${{ steps.package.outputs.checksum }}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          if [[ -z "${TAG_NAME}" || -z "${VERSION}" || -z "${CHECKSUM}" || -z "${DEFAULT_BRANCH}" ]]; then
            echo "Missing required metadata to sync binary podspec." >&2
            exit 1
          fi

          git fetch origin "${DEFAULT_BRANCH}"
          git checkout -B "ci/sync-binary-podspec" "origin/${DEFAULT_BRANCH}"

          ruby - "${PODSPEC_PATH}" "${VERSION}" "${CHECKSUM}" <<'RUBY'
          path, version, checksum = ARGV
          content = File.read(path)

          version_replaced = content.gsub(/s\.version\s*=\s*"[^"]+"/, %(s.version          = "#{version}"))
          if version_replaced == content
            abort("Failed to update s.version in #{path}")
          end

          checksum_replaced = version_replaced.gsub(/:sha256\s*=>\s*"[^"]+"/, %(:sha256 => "#{checksum}"))
          if checksum_replaced == version_replaced
            abort("Failed to update :sha256 in #{path}")
          end

          File.write(path, checksum_replaced)
          RUBY

          if git diff --quiet -- "${PODSPEC_PATH}"; then
            echo "No binary podspec changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${PODSPEC_PATH}"
          git commit -m "chore(specs): sync binary podspec for ${TAG_NAME}"

          for attempt in 1 2 3; do
            if git push origin HEAD:"${DEFAULT_BRANCH}"; then
              break
            fi

            if [[ "${attempt}" -eq 3 ]]; then
              echo "Failed to push podspec sync commit after ${attempt} attempts." >&2
              exit 1
            fi

            git fetch origin "${DEFAULT_BRANCH}"
            git rebase "origin/${DEFAULT_BRANCH}"
          done

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.checksum_path }}
          body: |
            ## XCFramework Assets

            - `${{ steps.package.outputs.xcframework_name }}.zip`
            - `${{ steps.package.outputs.xcframework_name }}.checksum.txt`

            SwiftPM checksum:
            `${{ steps.package.outputs.checksum }}`

      - name: Job Summary
        run: |
          {
            echo "## XCFramework Release"
            echo ""
            echo "- Tag: \`${{ steps.meta.outputs.tag }}\`"
            echo "- Artifact: \`${{ steps.package.outputs.xcframework_name }}.zip\`"
            echo "- Checksum: \`${{ steps.package.outputs.checksum }}\`"
            echo "- Checksum File: \`${{ steps.package.outputs.xcframework_name }}.checksum.txt\`"
            echo "- Binary Podspec Synced: \`${{ steps.sync_binary_podspec.outputs.changed || 'false' }}\`"
            echo "- Binary Podspec Commit: \`${{ steps.sync_binary_podspec.outputs.commit_sha || 'N/A' }}\`"
            echo "- Release: https://github.com/${{ github.repository }}/releases/tag/${{ steps.meta.outputs.tag }}"
            echo "- Workflow Logs: [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } >> "$GITHUB_STEP_SUMMARY"
