name: XCFramework Release

on:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.4)."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2

      - name: Install CocoaPods and plugin
        run: |
          gem install cocoapods cocoapods-generate
          pod --version

      - name: Build XCFramework
        shell: bash
        run: sh Scripts/build-xcframework.sh

      - name: Package XCFramework
        id: package
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT_DIR="gen/HMLoggerKit/Carthage/Build"
          XCFRAMEWORK_PATH="${ARTIFACT_DIR}/LoggerKit.xcframework"
          ZIP_PATH="${ARTIFACT_DIR}/LoggerKit.xcframework.zip"

          if [[ ! -d "${XCFRAMEWORK_PATH}" ]]; then
            echo "XCFramework not found: ${XCFRAMEWORK_PATH}" >&2
            exit 1
          fi

          rm -f "${ZIP_PATH}"
          ditto -c -k --sequesterRsrc --keepParent "${XCFRAMEWORK_PATH}" "${ZIP_PATH}"
          CHECKSUM="$(swift package compute-checksum "${ZIP_PATH}")"
          CHECKSUM_FILE="${ARTIFACT_DIR}/LoggerKit.xcframework.checksum.txt"

          {
            echo "File: LoggerKit.xcframework.zip"
            echo "SHA-256: ${CHECKSUM}"
          } > "${CHECKSUM_FILE}"

          echo "zip_path=${ZIP_PATH}" >> "$GITHUB_OUTPUT"
          echo "checksum_path=${CHECKSUM_FILE}" >> "$GITHUB_OUTPUT"
          echo "checksum=${CHECKSUM}" >> "$GITHUB_OUTPUT"

      - name: Resolve tag name
        id: meta
        shell: bash
        run: |
          TAG_INPUT="${{ github.event.inputs.tag }}"
          EVENT_NAME="${{ github.event_name }}"

          if [[ "${EVENT_NAME}" == "workflow_dispatch" && -z "${TAG_INPUT}" ]]; then
            echo "For workflow_dispatch, input 'tag' is required." >&2
            exit 1
          fi

          if [[ -n "${TAG_INPUT}" ]]; then
            TAG_NAME="${TAG_INPUT}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.checksum_path }}
          body: |
            ## XCFramework Assets

            - `LoggerKit.xcframework.zip`
            - `LoggerKit.xcframework.checksum.txt`

            SwiftPM checksum:
            `${{ steps.package.outputs.checksum }}`

      - name: Job Summary
        run: |
          {
            echo "## XCFramework Release"
            echo ""
            echo "- Tag: \`${{ steps.meta.outputs.tag }}\`"
            echo "- ZIP: \`${{ steps.package.outputs.zip_path }}\`"
            echo "- Checksum: \`${{ steps.package.outputs.checksum }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
