name: XCFramework Release

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag without v prefix (e.g. 0.2.4)."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2

      - name: Install Ruby gems
        run: |
          bundle install --jobs 4 --retry 3
          bundle exec pod --version

      - name: Ensure Bash 4+
        id: setup_bash
        shell: bash
        run: |
          set -euo pipefail
          echo "System /bin/bash: $(/bin/bash --version | head -n 1)"
          MODERN_BASH="$(brew --prefix)/bin/bash"
          if [[ ! -x "${MODERN_BASH}" ]]; then
            brew install bash
          fi
          if [[ ! -x "${MODERN_BASH}" ]]; then
            echo "Modern bash not found: ${MODERN_BASH}" >&2
            exit 1
          fi
          echo "Using modern bash: $(${MODERN_BASH} --version | head -n 1)"
          echo "modern_bash=${MODERN_BASH}" >> "$GITHUB_OUTPUT"

      - name: Build XCFramework
        id: build
        shell: bash
        run: |
          set -euo pipefail
          BASH_BIN="${{ steps.setup_bash.outputs.modern_bash }}"
          if [[ -z "${BASH_BIN}" || ! -x "${BASH_BIN}" ]]; then
            echo "Invalid bash path: ${BASH_BIN}" >&2
            exit 1
          fi
          OUTPUTS_FILE="$(mktemp)"
          "${BASH_BIN}" Scripts/build-xcframework-from-podspec.sh --outputs-file "${OUTPUTS_FILE}"

          XCFRAMEWORK_PATH=""
          ARTIFACT_DIR=""
          XCFRAMEWORK_NAME=""

          while IFS='=' read -r key value; do
            case "${key}" in
              xcframework_path) XCFRAMEWORK_PATH="${value}" ;;
              artifact_dir) ARTIFACT_DIR="${value}" ;;
              xcframework_name) XCFRAMEWORK_NAME="${value}" ;;
            esac
          done < "${OUTPUTS_FILE}"

          if [[ -z "${XCFRAMEWORK_PATH}" || ! -d "${XCFRAMEWORK_PATH}" ]]; then
            echo "XCFramework not found: ${XCFRAMEWORK_PATH}" >&2
            exit 1
          fi
          if [[ -z "${ARTIFACT_DIR}" || ! -d "${ARTIFACT_DIR}" ]]; then
            ARTIFACT_DIR="$(cd "$(dirname "${XCFRAMEWORK_PATH}")" && pwd)"
          fi
          if [[ -z "${XCFRAMEWORK_NAME}" ]]; then
            XCFRAMEWORK_NAME="$(basename "${XCFRAMEWORK_PATH}")"
          fi

          echo "xcframework_path=${XCFRAMEWORK_PATH}" >> "$GITHUB_OUTPUT"
          echo "artifact_dir=${ARTIFACT_DIR}" >> "$GITHUB_OUTPUT"
          echo "xcframework_name=${XCFRAMEWORK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Package XCFramework
        id: package
        shell: bash
        run: |
          set -euo pipefail
          XCFRAMEWORK_PATH="${{ steps.build.outputs.xcframework_path }}"
          if [[ -z "${XCFRAMEWORK_PATH}" || ! -d "${XCFRAMEWORK_PATH}" ]]; then
            echo "XCFramework not found: ${XCFRAMEWORK_PATH}" >&2
            exit 1
          fi

          ARTIFACT_DIR="${{ steps.build.outputs.artifact_dir }}"
          if [[ -z "${ARTIFACT_DIR}" || ! -d "${ARTIFACT_DIR}" ]]; then
            ARTIFACT_DIR="$(cd "$(dirname "${XCFRAMEWORK_PATH}")" && pwd)"
          fi
          XCFRAMEWORK_NAME="${{ steps.build.outputs.xcframework_name }}"
          if [[ -z "${XCFRAMEWORK_NAME}" ]]; then
            XCFRAMEWORK_NAME="$(basename "${XCFRAMEWORK_PATH}")"
          fi
          ZIP_PATH="${ARTIFACT_DIR}/${XCFRAMEWORK_NAME}.zip"

          rm -f "${ZIP_PATH}"
          ditto -c -k --sequesterRsrc --keepParent "${XCFRAMEWORK_PATH}" "${ZIP_PATH}"
          CHECKSUM="$(swift package compute-checksum "${ZIP_PATH}")"
          CHECKSUM_FILE="${ARTIFACT_DIR}/${XCFRAMEWORK_NAME}.checksum.txt"
          TAG_INPUT="${{ github.event.inputs.tag }}"
          if [[ -n "${TAG_INPUT}" ]]; then
            RAW_TAG="${TAG_INPUT}"
          else
            RAW_TAG="${GITHUB_REF_NAME}"
          fi
          TAG_NAME="${RAW_TAG#refs/tags/}"
          if [[ "${TAG_NAME}" =~ ^[vV] ]]; then
            echo "Tag must not start with 'v' for this workflow: ${TAG_NAME}" >&2
            exit 1
          fi
          VERSION="${TAG_NAME}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/${XCFRAMEWORK_NAME}.zip"
          PODSPEC_TEMPLATE="Specs/Binary/HMLoggerKit.podspec"
          BINARY_PODSPEC_FILE="${ARTIFACT_DIR}/HMLoggerKit.binary.podspec"

          if [[ ! -f "${PODSPEC_TEMPLATE}" ]]; then
            echo "Binary podspec template not found: ${PODSPEC_TEMPLATE}" >&2
            exit 1
          fi

          {
            echo "File: ${XCFRAMEWORK_NAME}.zip"
            echo "SHA-256: ${CHECKSUM}"
          } > "${CHECKSUM_FILE}"

          ruby - "${PODSPEC_TEMPLATE}" "${BINARY_PODSPEC_FILE}" "${VERSION}" "${CHECKSUM}" "${DOWNLOAD_URL}" <<'RUBY'
          template_path, output_path, version, checksum, download_url = ARGV
          content = File.read(template_path)

          unless content.match?(/s\.version\s*=\s*"[^"]+"/)
            abort("Failed to find s.version in #{template_path}")
          end
          unless content.match?(/:sha256\s*=>\s*"[^"]+"/)
            abort("Failed to find :sha256 in #{template_path}")
          end
          unless content.match?(/:http\s*=>\s*"[^"]+"/)
            abort("Failed to find :http in #{template_path}")
          end

          updated = content.gsub(/s\.version\s*=\s*"[^"]+"/, %(s.version          = "#{version}"))
          updated = updated.gsub(/:sha256\s*=>\s*"[^"]+"/, %(:sha256 => "#{checksum}"))
          updated = updated.gsub(/:http\s*=>\s*"[^"]+"/, %(:http => "#{download_url}"))

          File.write(output_path, updated)
          RUBY

          echo "xcframework_name=${XCFRAMEWORK_NAME}" >> "$GITHUB_OUTPUT"
          echo "zip_path=${ZIP_PATH}" >> "$GITHUB_OUTPUT"
          echo "checksum_path=${CHECKSUM_FILE}" >> "$GITHUB_OUTPUT"
          echo "binary_podspec_path=${BINARY_PODSPEC_FILE}" >> "$GITHUB_OUTPUT"
          echo "checksum=${CHECKSUM}" >> "$GITHUB_OUTPUT"

      - name: Resolve tag name
        id: meta
        shell: bash
        run: |
          TAG_INPUT="${{ github.event.inputs.tag }}"
          EVENT_NAME="${{ github.event_name }}"

          if [[ "${EVENT_NAME}" == "workflow_dispatch" && -z "${TAG_INPUT}" ]]; then
            echo "For workflow_dispatch, input 'tag' is required." >&2
            exit 1
          fi

          if [[ -n "${TAG_INPUT}" ]]; then
            RAW_TAG="${TAG_INPUT}"
          else
            RAW_TAG="${GITHUB_REF_NAME}"
          fi
          TAG_NAME="${RAW_TAG#refs/tags/}"
          if [[ "${TAG_NAME}" =~ ^[vV] ]]; then
            echo "Tag must not start with 'v' for this workflow: ${TAG_NAME}" >&2
            exit 1
          fi
          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.checksum_path }}
            ${{ steps.package.outputs.binary_podspec_path }}
          body: |
            ## XCFramework Assets

            - `${{ steps.package.outputs.xcframework_name }}.zip`
            - `${{ steps.package.outputs.xcframework_name }}.checksum.txt`
            - `HMLoggerKit.binary.podspec`

            SwiftPM checksum:
            `${{ steps.package.outputs.checksum }}`

      - name: Job Summary
        run: |
          {
            echo "## XCFramework Release"
            echo ""
            echo "- Tag: \`${{ steps.meta.outputs.tag }}\`"
            echo "- Artifact: \`${{ steps.package.outputs.xcframework_name }}.zip\`"
            echo "- Checksum: \`${{ steps.package.outputs.checksum }}\`"
            echo "- Checksum File: \`${{ steps.package.outputs.xcframework_name }}.checksum.txt\`"
            echo "- Binary Podspec: \`HMLoggerKit.binary.podspec\`"
            echo "- Release: https://github.com/${{ github.repository }}/releases/tag/${{ steps.meta.outputs.tag }}"
            echo "- Workflow Logs: [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } >> "$GITHUB_STEP_SUMMARY"
