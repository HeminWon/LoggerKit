name: CocoaPods Release

on:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Validate secret exists
        run: |
          if [ -z "${COCOAPODS_TRUNK_TOKEN}" ]; then
            echo "COCOAPODS_TRUNK_TOKEN is not set"
            exit 1
          fi

      - name: Validate trunk token
        run: pod trunk me

      - name: Validate tag matches podspec version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          SPEC_VERSION="$(ruby -e 'puts File.read("HMLoggerKit.podspec")[/s.version\s*=\s*"([^"]+)"/, 1]')"

          if [ -z "${SPEC_VERSION}" ]; then
            echo "Failed to read s.version from HMLoggerKit.podspec"
            exit 1
          fi

          if [ "${TAG_VERSION}" != "${SPEC_VERSION}" ]; then
            echo "Tag (${TAG_VERSION}) does not match podspec version (${SPEC_VERSION})"
            exit 1
          fi

      - name: Lint podspec
        run: pod spec lint HMLoggerKit.podspec --allow-warnings --verbose

      - name: Publish to CocoaPods trunk
        if: startsWith(github.ref, 'refs/tags/')
        run: pod trunk push HMLoggerKit.podspec --allow-warnings --verbose
